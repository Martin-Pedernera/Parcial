<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
    <body>
        <div class="contenedor">
            <form id="formulario">

                <label for="nombreApellido">Nombre y Apellido:</label>
                <input class="input" type="text" id="nombreApellido" placeholder="Ingrese su Nombre y Apellido">
                <div class="error" id="errorNombreApellido"></div>

                <label for="dni">DNI:</label>
                <input class="input" type="text" id="dni" placeholder="Ingrese su DNI">
                <div class="error" id="errorDni"></div>

                <label for="fecha">Fecha de Nacimiento:</label>
                <input class="input" type="date" id="fecha">
                <div class="error" id="errorFecha"></div>

                <button type="button" onclick="preguntas()">Preguntas</button>

                <button type="button" onclick="enviarFormulario()">Enviar</button>
                <div id="mensajeExito"></div>

                <div class="resultado">
                    <p>Sus respuestas fueron:</p>
                    <div class="respuestas" id="mostrarRespuestas"></div>
                </div>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
</html>
